<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 460" role="img" aria-label="Rajender Mittal Gajar Pak Wale">
  <defs>
    <radialGradient id="red" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#e0233a"/><stop offset="0.7" stop-color="#c4112a"/><stop offset="1" stop-color="#9c0a20"/>
    </radialGradient>
    <linearGradient id="goldring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3da8c"/><stop offset="0.5" stop-color="#c49a3f"/><stop offset="1" stop-color="#9a772a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5e1726" flood-opacity="0.3"/></filter>
  </defs>

  <g filter="url(#soft)">
    <ellipse cx="310" cy="230" rx="298" ry="200" fill="url(#goldring)"/>
    <ellipse cx="310" cy="230" rx="284" ry="186" fill="url(#red)"/>
    <ellipse cx="310" cy="230" rx="270" ry="172" fill="none" stroke="#f3da8c" stroke-width="3" opacity="0.9"/>
  </g>

  <!-- top crest flourish -->
  <path d="M180 78 q130 -42 260 0" fill="none" stroke="#e6c772" stroke-width="5" stroke-linecap="round"/>
  <circle cx="310" cy="64" r="7" fill="#e6c772"/>

  <!-- hindi line -->
  <text x="310" y="128" text-anchor="middle" font-family="Georgia, 'Noto Sans Devanagari', serif" font-size="30" fill="#f6e7b8" letter-spacing="2">जय सच्चिदानन्द</text>

  <!-- main name -->
  <text x="310" y="240" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700" font-size="84" fill="#fbeec2">Rajender Mittal</text>

  <!-- subline -->
  <text x="310" y="318" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="40" letter-spacing="10" fill="#f6e7b8">GAJAR PAK WALE</text>

  <!-- bottom flourish -->
  <path d="M200 372 q110 38 220 0" fill="none" stroke="#e6c772" stroke-width="5" stroke-linecap="round"/>

  <!-- sparkles -->
  <g fill="#fbeec2">
    <path d="M96 168 l8 22 22 8 -22 8 -8 22 -8 -22 -22 -8 22 -8 z"/>
    <path d="M524 168 l8 22 22 8 -22 8 -8 22 -8 -22 -22 -8 22 -8 z"/>
    <path d="M120 320 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z"/>
    <path d="M500 320 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z"/>
  </g>
  <text x="566" y="120" font-family="Arial, sans-serif" font-size="22" fill="#9c0a20">®</text>
</svg>
