<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="Mawa Barfi on a silver tray">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f6f7f9"/><stop offset="0.5" stop-color="#cfd5db"/><stop offset="1" stop-color="#a7aeb6"/></linearGradient>
    <linearGradient id="barfi" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ecca97"/><stop offset="0.45" stop-color="#dcab6e"/><stop offset="1" stop-color="#c79155"/></linearGradient>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect x="8" y="8" width="104" height="104" rx="13" fill="url(#barfi)"/>
      <rect x="8" y="8" width="104" height="34" rx="13" fill="#fff" opacity="0.16"/>
      <ellipse cx="44" cy="46" rx="7" ry="2.6" fill="#7e9a48" transform="rotate(-20 44 46)"/>
    </pattern>
  </defs>
  <ellipse cx="500" cy="510" rx="392" ry="296" fill="url(#silver)"/>
  <ellipse cx="500" cy="510" rx="392" ry="296" fill="none" stroke="#fff" stroke-width="6" opacity="0.55"/>
  <ellipse cx="500" cy="510" rx="362" ry="270" fill="none" stroke="#9aa1a9" stroke-width="3" stroke-dasharray="3 7"/>
  <ellipse cx="500" cy="510" rx="330" ry="240" fill="#edf0f3"/>
  <clipPath id="inner"><ellipse cx="500" cy="510" rx="318" ry="230"/></clipPath>
  <g clip-path="url(#inner)"><rect x="180" y="280" width="640" height="460" fill="url(#grid)"/></g>
</svg>
